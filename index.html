<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENVYGO | Elite Craft</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .luxury-text { font-family: 'Cinzel', serif; letter-spacing: 0.2em; }
        .glass-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 2rem 2.5rem; display: flex; justify-content: space-between;
            align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            backdrop-filter: blur(10px);
        }
        .product-card {
            background: #0a0a0a; border: 1px solid rgba(255,255,255,0.03);
            padding: 15px; transition: all 0.5s ease;
        }
        .product-card:hover { border-color: rgba(201, 169, 97, 0.3); transform: translateY(-5px); }
        .btn-gold {
            margin-top: 20px; padding: 12px; text-align: center;
            border: 1px solid #C9A961; color: #C9A961; font-size: 9px;
            letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
            transition: 0.4s;
        }
        .btn-gold:hover { background: #C9A961; color: black; }
        footer { padding: 100px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 100px; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel" src="app.js"></script>

</body>
</html>
