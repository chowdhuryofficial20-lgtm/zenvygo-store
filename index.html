<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENVYGO | Elite Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; }
        .logo-bright { filter: invert(1) brightness(1.5); }
        .product-card:hover img { transform: scale(1.05); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const products = [
            { id: 1, name: "Noir Essence", price: "4200", desc: "A deep, mysterious fragrance for the modern visionary. Long-lasting luxury blend.", img: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=800" },
            { id: 2, name: "Chrome Sport", price: "3500", desc: "Fresh, energetic and bold. Perfect for your active daily lifestyle.", img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=800" },
            { id: 3, name: "Velvet Oud", price: "5800", desc: "Rich royal oud extract. The pinnacle of oriental luxury craftsmanship.", img: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=800" }
        ];

        function App() {
            const [page, setPage] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [orders, setOrders] = useState([]);
            const [customer, setCustomer] = useState({ name: '', phone: '', address: '' });

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('zenvygo_orders') || '[]');
                setOrders(saved);
            }, []);

            const openDetails = (p) => { setSelectedProduct(p); setPage('details'); window.scrollTo(0,0); };

            const handleOrder = (e) => {
                e.preventDefault();
                const newOrder = { 
                    id: '#' + Math.floor(Math.random()*90000), 
                    ...customer, 
                    product: selectedProduct.name, 
                    price: selectedProduct.price,
                    date: new Date().toLocaleString() 
                };
                const updated = [newOrder, ...orders];
                setOrders(updated);
                localStorage.setItem('zenvygo_orders', JSON.stringify(updated));
                alert("ORDER SUCCESSFUL! WE WILL CALL YOU SOON.");
                setPage('home');
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav className="p-6 flex justify-between items-center sticky top-0 bg-black/90 z-50 border-b border-white/5">
                        <div onClick={() => setPage('home')} className="flex items-center gap-3 cursor-pointer">
                            <img src="logo.png" className="h-7 logo-bright" />
                            <span className="font-black tracking-tighter text-xl italic">ZENVYGO</span>
                        </div>
                        <button onClick={() => setPage('admin')} className="text-[10px] tracking-widest opacity-40 hover:opacity-100">DASHBOARD</button>
                    </nav>

                    {page === 'home' && (
                        <div className="p-8">
                            <h1 className="text-5xl font-black mb-12 text-center py-20 tracking-tighter italic uppercase">Elite Collection</h1>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-6xl mx-auto">
                                {products.map(p => (
                                    <div key={p.id} className="product-card cursor-pointer group" onClick={() => openDetails(p)}>
                                        <div className="overflow-hidden bg-[#111] aspect-[3/4] mb-4 border border-white/5">
                                            <img src={p.img} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700" />
                                        </div>
                                        <h3 className="font-bold uppercase tracking-widest text-sm">{p.name}</h3>
                                        <p className="opacity-50 text-xs mt-1">BDT {p.price}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {page === 'details' && (
                        <div className="p-8 max-w-5xl mx-auto pt-20">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                <img src={selectedProduct.img} className="w-full border border-white/10" />
                                <div>
                                    <h2 className="text-4xl font-black uppercase mb-4">{selectedProduct.name}</h2>
                                    <p className="text-2xl mb-6 italic text-gray-400">BDT {selectedProduct.price}</p>
                                    <p className="text-gray-500 mb-10 leading-relaxed uppercase text-xs tracking-widest">{selectedProduct.desc}</p>
                                    
                                    <form onSubmit={handleOrder} className="space-y-4 glass p-6 rounded-sm">
                                        <p className="text-[10px] tracking-[0.3em] font-bold mb-4">DELIVERY DETAILS</p>
                                        <input required placeholder="YOUR NAME" className="w-full bg-white/5 border border-white/10 p-3 text-xs outline-none focus:border-white" 
                                            onChange={e => setCustomer({...customer, name: e.target.value})} />
                                        <input required placeholder="PHONE NUMBER" className="w-full bg-white/5 border border-white/10 p-3 text-xs outline-none focus:border-white" 
                                            onChange={e => setCustomer({...customer, phone: e.target.value})} />
                                        <textarea required placeholder="FULL ADDRESS" className="w-full bg-white/5 border border-white/10 p-3 text-xs outline-none focus:border-white h-24" 
                                            onChange={e => setCustomer({...customer, address: e.target.value})}></textarea>
                                        <button className="w-full bg-white text-black py-4 font-black uppercase tracking-widest text-xs hover:bg-gray-200">Confirm Order</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {page === 'admin' && (
                        <div className="p-10 max-w-4xl mx-auto">
                            <h2 className="text-4xl font-black mb-10 italic">ORDERS_LOG</h2>
                            {orders.map(o => (
                                <div key={o.id} className="p-6 border border-white/10 mb-4 glass">
                                    <div className="flex justify-between font-bold mb-4 border-b border-white/5 pb-2">
                                        <span>{o.product}</span>
                                        <span>{o.price} BDT</span>
                                    </div>
                                    <p className="text-xs text-gray-400">CUSTOMER: {o.name}</p>
                                    <p className="text-xs text-gray-400">PHONE: {o.phone}</p>
                                    <p className="text-xs text-gray-400">ADDRESS: {o.address}</p>
                                    <p className="text-[9px] mt-4 opacity-20">{o.date}</p>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Footer / Social / Address */}
                    <footer className="mt-40 p-12 border-t border-white/5 bg-[#050505] text-center">
                        <div className="flex justify-center gap-8 mb-8 text-xl">
                            <a href="www.facebook.com/zenvygo" target="_blank"><i className="fab fa-facebook-f opacity-50 hover:opacity-100 transition"></i></a>
                            <a href="www.instagram.com/zenvygo" target="_blank"><i className="fab fa-instagram opacity-50 hover:opacity-100 transition"></i></a>
                            <a href="mailto:contact@zenvygo.com"><i className="far fa-envelope opacity-50 hover:opacity-100 transition"></i></a>
                        </div>
                        <p className="text-[10px] tracking-[0.4em] text-gray-600 uppercase mb-2">House 1353/2, Paterbag, Dania, Kadomtoli, Dhaka, Bangladesh</p>
                        <p className="text-[10px] tracking-[0.4em] text-gray-600 uppercase">+880 1618 479130</p>
                        <p className="mt-10 text-[8px] opacity-20">© 2026 ZENVYGO STUDIO. ALL RIGHTS RESERVED.</p>
                    </footer>

                    {/* Floating Chat Buttons */}
                    <div className="fixed bottom-6 right-6 flex flex-col gap-3 z-[100]">
                        <a href="https://wa.me/+8801618479130" target="_blank" className="bg-[#25D366] w-12 h-12 rounded-full flex items-center justify-center text-2xl shadow-lg hover:scale-110 transition">
                            <i className="fab fa-whatsapp text-white"></i>
                        </a>
                        <a href="https://m.me/www.facebook.com/zenvygo" target="_blank" className="bg-[#0084FF] w-12 h-12 rounded-full flex items-center justify-center text-2xl shadow-lg hover:scale-110 transition">
                            <i className="fab fa-facebook-messenger text-white"></i>
                        </a>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
