<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenvygo | Shop Smart, Live Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .logo-bright { filter: invert(1) brightness(2); } /* এই লাইনটি লোগো সাদা করবে */
    </style>
</head>
<body class="bg-[#0a0a0a] text-white">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [view, setView] = React.useState('home');
            const [orders, setOrders] = React.useState([]);

            React.useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('zenvygo_orders') || '[]');
                setOrders(saved);
            }, []);

            const products = [
                { id: 1, name: "Signature Fragrance 01", price: "3200", img: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=800" },
                { id: 2, name: "Luxury Black Edition", price: "4500", img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=800" },
                { id: 3, name: "Elite Mist", price: "2800", img: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=800" }
            ];

            const placeOrder = (product) => {
                const newOrder = { id: '#' + Math.floor(Math.random()*90000), name: product.name, price: product.price, date: new Date().toLocaleString() };
                const updated = [newOrder, ...orders];
                setOrders(updated);
                localStorage.setItem('zenvygo_orders', JSON.stringify(updated));
                alert("Order Confirmed!");
                setView('home');
            };

            return (
                <div className="min-h-screen">
                    {/* Navbar */}
                    <nav className="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-md z-50">
                        <div onClick={() => setView('home')} className="cursor-pointer flex items-center gap-2">
                            <img src="logo.png" alt="ZENVYGO" className="h-10 logo-bright" />
                        </div>
                        <button onClick={() => setView('admin')} className="text-[9px] tracking-widest border border-white/20 px-3 py-1 uppercase">Admin</button>
                    </nav>

                    {view === 'admin' ? (
                        <div className="p-10 max-w-5xl mx-auto">
                            <h2 className="text-4xl font-black mb-10 italic">ORDERS</h2>
                            <div className="space-y-4">
                                {orders.length === 0 ? <p className="opacity-30">No orders yet.</p> : 
                                    orders.map(o => (
                                        <div key={o.id} className="p-4 border border-white/10 flex justify-between">
                                            <div><p className="font-bold">{o.name}</p><p className="text-xs text-gray-500">{o.date}</p></div>
                                            <p className="font-bold">{o.price} BDT</p>
                                        </div>
                                    ))
                                }
                            </div>
                        </div>
                    ) : (
                        <div>
                            <div className="py-20 text-center">
                                <h2 className="text-6xl md:text-9xl font-black italic tracking-tighter mb-4">ZENVYGO</h2>
                                <p className="text-gray-500 uppercase tracking-[0.4em] text-xs">shop smart, live fast</p>
                            </div>
                            <div className="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-10">
                                {products.map(p => (
                                    <div key={p.id}>
                                        <img src={p.img} className="w-full grayscale hover:grayscale-0 transition duration-700 mb-4" />
                                        <h3 className="font-bold uppercase text-sm tracking-widest">{p.name}</h3>
                                        <p className="text-gray-500 text-xs mb-4">BDT {p.price}</p>
                                        <button onClick={() => placeOrder(p)} className="w-full bg-white text-black py-3 font-black uppercase text-[10px] tracking-widest hover:invert">Confirm Order</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
